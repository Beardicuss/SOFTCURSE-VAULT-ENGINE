<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: transparent; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh;
            overflow: hidden;
        }
        
        /* From Uiverse.io by andrew-demchenk0 - Modified for orange theme */
        .cube-loader {
            position: relative;
            width: 75px;
            height: 75px;
            transform-style: preserve-3d;
            transform: rotateX(-30deg);
            animation: animate 4s linear infinite;
        }

        @keyframes animate {
            0% { transform: rotateX(-30deg) rotateY(0); }
            100% { transform: rotateX(-30deg) rotateY(360deg); }
        }

        .cube-loader .cube-wrapper {
            position: absolute;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
        }

        .cube-loader .cube-wrapper .cube-span {
            position: absolute;
            width: 100%;
            height: 100%;
            transform: rotateY(calc(90deg * var(--i))) translateZ(37.5px);
            background: linear-gradient(
                to bottom,
                #151515 0%,
                #331100 5.5%,
                #552200 12.1%,
                #773300 19.6%,
                #994400 27.9%,
                #BB5500 36.6%,
                #CC5500 45.6%,
                #DD5500 54.6%,
                #EE5500 63.4%,
                #FF5500 71.7%,
                #FF6000 79.4%,
                #FF6600 86.2%,
                #FF6600 91.9%,
                #FF6600 96.3%,
                #FF6600 99%,
                #FF6600 100%
            );
        }

        .cube-top {
            position: absolute;
            width: 75px;
            height: 75px;
            background: #151515;
            transform: rotateX(90deg) translateZ(37.5px);
            transform-style: preserve-3d;
        }

        .cube-top::before {
            content: '';
            position: absolute;
            width: 75px;
            height: 75px;
            background: #773300;
            transform: translateZ(-90px);
            filter: blur(10px);
            box-shadow: 0 0 10px #151515,
                        0 0 20px #773300,
                        0 0 30px #151515,
                        0 0 40px #773300;
        }
    </style>
</head>
<body>
    <div class="cube-loader">
        <div class="cube-top"></div>
        <div class="cube-wrapper">
            <span style="--i:0" class="cube-span"></span>
            <span style="--i:1" class="cube-span"></span>
            <span style="--i:2" class="cube-span"></span>
            <span style="--i:3" class="cube-span"></span>
        </div>
    </div>
</body>
</html>
